name: wasm
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build tsvsheet.wasm for
        required: true
permissions:
  contents: write
concurrency:
  group: wasm-${{ github.ref }}
  cancel-in-progress: false
# Org modules (gomatic/*, uplang/*, …) are fetched directly from git, not the
# public proxy, matching go.sum and the rest of the org's CI — the plain proxy
# serves a different (older) blob for a re-tagged dependency.
env:
  GOPRIVATE: github.com/gomatic/*,github.com/nicerobot/*,github.com/gloo-foo/*,github.com/sqlrest/*,github.com/uplang/*,github.com/tsvsheet/*,github.com/skykernel/*,github.com/xto-email/*
jobs:
  wasm:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true
          cache: true
      # Build the engine WebAssembly (dist/tsvsheet.wasm + dist/wasm_exec.js) and
      # attach it to the release that triggered this run, so browser consumers
      # (the docs playground, tsvsheet.js) pin a versioned tsvsheet.wasm.
      - run: make wasm
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.event.release.tag_name }}
          files: |
            dist/tsvsheet.wasm
            dist/wasm_exec.js
